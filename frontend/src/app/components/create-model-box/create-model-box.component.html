<div class="border-top pt-4">
    <h3 class="h5 fw-medium text-dark mb-3 d-flex align-items-center">
        <i class="fas fa-plus-circle me-2 text-primary"></i> Crea nuovo modello
    </h3>

    <div class="mb-3">
        <label for="model-type" class="form-label">Seleziona il tipo di modello</label>
        <select id="model-type" name="model-type" [formControl]="type_model" class="form-select">
            <option value="BERT">BERT</option>
            <option value="Ngrams">N-grammi</option>
        </select>
    </div>

    @if (type_model.value == "BERT") {
    <form id="create-model-form" 
    [formGroup]="bertFormGroup" 
    (submit)="createModel()"
    class="vstack gap-3">
        <div>
            <label for="checkpoint" class="form-label">Checkpoint</label>
            <input type="text" id="checkpoint" name="checkpoint" formControlName="CHECKPOINT" class="form-control"
                placeholder="Es: CNR-ILC/gs-GreBerta">
        </div>

        <div>
            <label for="bert-predictions" class="form-label">Numero predizioni</label>
            <select id="bert-predictions" name="bert-predictions" formControlName="K_PRED" class="form-select">
                <option value="10">10</option>
                <option value="20">20</option>
            </select>
        </div>

        <button 
        type="submit" 
        class="btn btn-primary d-flex align-items-center justify-content-center">
            <i class="fas fa-save me-2"></i> Crea Modello
        </button>
    </form>
    }
    @else {
    <form id="create-model-form" 
    [formGroup]="ngramsFormGroup"
    (submit)="createModel()" 
    class="vstack gap-3">
        <div>
            <label for="ngram-technique" class="form-label">Tecnica di score</label>
            <select id="ngram-technique" name="ngram-technique" formControlName="LM_SCORE" class="form-select">
                <option value="MLE">MLE (Maximum Likelihood Estimation)</option>
                <option value="LIDSTONE">LIDSTONE</option>
            </select>
        </div>

        @if (ngramsFormGroup.get('LM_SCORE')?.value == "LIDSTONE") {
            <div id="gamma-container">
                <label for="ngram-gamma" class="form-label">Valore gamma</label>
                <select id="ngram-gamma" name="ngram-gamma" formControlName="GAMMA" class="form-select">
                    <option value="0.1">0.1</option>
                    <option value="0.01">0.01</option>
                    <option value="0.001">0.001</option>
                </select>
            </div>
        }

        <div>
            <label for="ngram-min-freq" class="form-label">Frequenza minima token</label>
            <select id="ngram-min-freq" name="ngram-min-freq" formControlName="MIN_FREQ" class="form-select">
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
            </select>
        </div>

        <div>
            <label for="ngram-predictions" class="form-label">Numero predizioni</label>
            <select id="ngram-predictions" name="ngram-predictions" formControlName="K_PRED" class="form-select">
                <option value="10">10</option>
                <option value="20">20</option>
            </select>
        </div>

        <div>
            <label for="ngram-test-size" class="form-label">Dimensione test set</label>
            <select id="ngram-test-size" name="ngram-test-size" formControlName="TEST_SIZE" class="form-select">
                <option value="0.05">5%</option>
                <option value="0.1">10%</option>
            </select>
        </div>

        <div>
            <label for="ngram-dimension" class="form-label">Dimensionalità n-grammi del modello</label>
            <select id="ngram-dimension" name="ngram-dimension" formControlName="N" class="form-select">
                <option value="2">2</option>
                <option value="3">3</option>
            </select>
        </div>

        <div>
            <label class="form-label">Corpus di addestramento</label>
            <div class="vstack gap-2">
                <div class="form-check">
                    <input id="corpus-ddbdp" name="corpus" value="DDbDP" type="checkbox" checked class="form-check-input">
                    <label for="corpus-ddbdp" class="form-check-label">DdbdP</label>
                </div>
                <div class="form-check">
                    <input id="corpus-DCLP" name="corpus" value="DCLP" type="checkbox" checked class="form-check-input">
                    <label for="corpus-DCLP" class="form-check-label">DCLP</label>
                </div>
                <div class="form-check">
                    <input id="corpus-EDH" name="corpus" value="EDH" type="checkbox" checked class="form-check-input">
                    <label for="corpus-EDH" class="form-check-label">EDH</label>
                </div>
            </div>
        </div>

        <button type="submit" class="btn btn-primary d-flex align-items-center justify-content-center">
            <i class="fas fa-save me-2"></i> Crea Modello
        </button>
    </form>
    }
</div>
