<!-- Form Generazione Suggerimenti -->
<div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="card shadow rounded-4 mb-5" [formGroup]="form">
                    <div class="card-header rounded-top-4 bg-primary text-white">
                        <h2 class="h4 mb-0">Generatore di Suggerimenti</h2>
                    </div>
                    <div class="card-body">
                        <div class="mb-4">
                            <label for="inputText" class="form-label fw-bold">Testo con lacuna</label>
                            <textarea class="form-control" id="inputText" formControlName="text" rows="3"
                                placeholder="Inserisci il testo con una lacuna (es: τὰς ὀφειλομένας τῇ τοῦ Ἀνθεντίου μητρὶ [...] Σισόιτος)"></textarea>
                            <div class="form-text">Usa [...] per indicare la lacuna da completare</div>
                        </div>

                        <div class="mb-4">
                            <label for="modelId" class="form-label fw-bold">ID Modello</label>
                            <div class="input-group">
                                <input type="text" class="form-control" formControlName="modelID" id="modelId"
                                    placeholder="Inserisci l'ID del modello">
                                <button 
                                class="btn btn-outline-secondary"
                                 type="button" 
                                 id="showModelsBtn"
                                 (click)="toggleModels()">
                                    <i class="bi bi-collection"></i> Mostra Modelli
                                </button>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <div>
                                <button class="btn btn-primary" (click)="generateSuggestions()" id="generateBtn">
                                    <i class="bi bi-magic"></i> Genera Suggerimenti
                                </button>
                                <div class="spinner-border text-primary ms-2 d-none" id="loadingSpinner" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                            </div>
                            <div>
                                <button 
                                class="btn btn-outline-secondary"
                                id="clearBtn"
                                (click)="clearForm()"
                                type="button">
                                    <i class="bi bi-trash"></i> Pulisci
                                </button>
                            </div>
                        </div>

                        <div class="alert alert-info" id="previewArea" style="display: none;">
                            <strong>Anteprima richiesta:</strong>
                            <div class="mt-2 text-with-gap" id="previewText"></div>
                            <div class="mt-2"><strong>Modello:</strong> <span id="previewModel"></span></div>
                        </div>
                    </div>
                </div>

                <div class="card shadow-sm mb-5" id="modelsCard" style="display: none;">
                    <div class="card-header bg-success text-white">
                        <h3 class="h5 mb-0">Modelli Disponibili</h3>
                    </div>
                    <div class="card-body">
                        <div class="row" id="modelsContainer">
                            @for (model of models(); track $index) {
                                <app-model [model]="model"></app-model>
                            }
                        </div>
                    </div>
                </div>

                <div class="card shadow-sm" id="resultsCard" style="display: none;">
                    <div class="card-header bg-info text-white">
                        <h3 class="h5 mb-0">Risultati</h3>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <h4 class="h6 text-muted">Testo originale:</h4>
                            <p class="text-with-gap" id="originalTextDisplay"></p>
                        </div>

                        <h4 class="h5 mb-3">Suggerimenti generati:</h4>
                        <div class="list-group" id="suggestionsList">
                            <!-- Suggerimenti verranno inseriti qui dinamicamente -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
</div>
