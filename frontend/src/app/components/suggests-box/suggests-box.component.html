<div class="card rounded-4 shadow" id="resultsCard">
    <div class="card-header rounded-top-4 bg-info text-white">
        <h3 class="h5 mb-0"><i class="bi bi-lightbulb-fill"></i> Suggerimenti generati</h3>
    </div>
    <div class="card-body">
        <div class="mb-3">
            <h4 class="h6 text-muted">Fai doppio click <i class="bi bi-hand-index"></i> per copiare il
                suggerimento selezionato sugli appunti</h4>
            <p class="text-with-gap" id="originalTextDisplay"></p>
        </div>

        <h4 class="h5 mb-3">Risultati:</h4>
        <div class="list-group" id="suggestionsList">
            @for (suggest of suggestions(); track $index) {
            <app-suggest [suggest]="suggest" />
            }
        </div>
    </div>
</div>
