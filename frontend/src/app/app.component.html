<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="app.component.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-bold text-indigo-700 mb-2">{{ title }}</h1>
            <p class="text-gray-600">Gestisci i modelli e genera suggerimenti automatici</p>
        </header>
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Sezione Modelli -->
            <div class="bg-white rounded-xl shadow-md overflow-hidden fade-in">
                <div class="bg-indigo-600 px-6 py-4">
                    <h2 class="text-xl font-semibold text-white flex items-center">
                        <i class="fas fa-cube mr-2"></i> Gestione Modelli
                    </h2>
                </div>
                
                <div class="p-6">
                    <!-- Lista Modelli -->
                    <div class="mb-6">
                        <h3 class="text-lg font-medium text-gray-800 mb-4 flex items-center">
                            <i class="fas fa-list-ul mr-2 text-indigo-500"></i> Modelli disponibili
                        </h3>
                        <div id="models-list" class="space-y-3">
                          @if (models()) {
                            @for (model of models(); track $index) {
                              <app-model [model]="model"/>
                            }
                          }
                          @else {
                            <div class="text-center text-gray-500">
                              <i class="fas fa-exclamation-circle text-red-500"></i>
                              <p>Nessun modello disponibile. Crea un nuovo modello per iniziare.</p>
                            </div>
                          } 
                    </div>
                    
                    <!-- Form Creazione Modello -->
                    <app-create-model-box/>
                </div>
            </div>
            
            <!-- Sezione Generazione Suggerimenti -->
            <div class="bg-white rounded-xl shadow-md overflow-hidden fade-in">
                <div class="bg-indigo-600 px-6 py-4">
                    <h2 class="text-xl font-semibold text-white flex items-center">
                        <i class="fas fa-lightbulb mr-2"></i> Generazione Suggerimenti
                    </h2>
                </div>
                
                <div class="p-6">
                    <app-suggests-box/>
                </div>
            </div>
        </div>
    </div>
